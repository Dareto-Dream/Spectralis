name: Build & Test

on:
  push:
    branches: [dev, staging, main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore -c Release
      - name: Test
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=results.trx" --collect:"XPlat Code Coverage"
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          files: '**/coverage.cobertura.xml'

  package-windows:
    name: Package Windows
    runs-on: windows-latest
    needs: test
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build MSIX
        run: pwsh packaging/windows/build-msix.ps1 -Version ${{ github.ref_name == 'main' && '5.0.0' || 'dev' }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: dist/windows/*.msix

  package-macos:
    name: Package macOS
    runs-on: macos-latest
    needs: test
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build DMG
        run: bash packaging/macos/build-app.sh
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/macos/*.dmg

  package-linux:
    name: Package Linux
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool
      - name: Build AppImage
        run: bash packaging/linux/build-appimage.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/linux/*.AppImage
