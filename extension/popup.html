<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spectralis</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Spectralis</h1>
        <p id="candidateText">Checking this tab...</p>
      </div>
    </header>

    <label class="switchRow">
      <span>
        <strong>Auto queue</strong>
        <small>Queue supported audio links and keep the current page open.</small>
      </span>
      <input id="autoOpen" type="checkbox" role="switch">
    </label>

    <div class="buttonGrid">
      <button id="openButton" type="button">Play Now</button>
      <button id="queueButton" type="button">Queue</button>
    </div>
    <p id="status" aria-live="polite"></p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
