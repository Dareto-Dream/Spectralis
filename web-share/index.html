<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="theme-color" content="#0f1724">
  <meta property="og:title" content="Spectralis Listen Together">
  <meta property="og:description" content="Join a synced Spectralis Shared Play room with a live browser visualizer.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <title>Spectralis Shared Play</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='6' fill='%230b0b0a'/%3E%3Ccircle cx='32' cy='32' r='21' fill='%23d8a13a'/%3E%3Ccircle cx='32' cy='32' r='8' fill='%230b0b0a'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="player-shell">
    <section class="now-card" aria-live="polite">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="experienceKicker">Spectralis</p>
          <h1 id="experienceTitle">Shared Play</h1>
        </div>
        <div class="room-status">
          <div class="listener-count" id="listenerCount">0 listening</div>
          <div class="network-mode" id="networkMode">Pure sync</div>
          <div class="session-state" id="sessionState">Offline</div>
        </div>
      </header>
      <div class="reaction-layer" id="reactionLayer" aria-hidden="true"></div>

      <section class="channel-panel" id="channelPanel" hidden aria-label="Live Channel">
        <div class="channel-identity">
          <span>Live Channel</span>
          <strong id="channelName">Channel</strong>
        </div>
        <div class="channel-stats" id="channelStats" hidden>
          <span id="channelSharedHours">0h shared</span>
          <span id="channelListenerHours">0 listener-hours</span>
          <span id="channelPeakListeners">0 peak</span>
          <span id="channelTopTrack">No top track yet</span>
        </div>
      </section>

      <section class="stage" aria-label="Playback visualizer">
        <div class="album-plate" id="albumPlate">
          <div class="disc-core"></div>
        </div>
        <canvas id="meterCanvas" width="640" height="220"></canvas>
      </section>

      <section class="track-stack">
        <p class="track-kicker" id="trackKicker">Private listening room</p>
        <h2 id="trackTitle">Waiting for a Shared Play session</h2>
        <p id="trackArtist">No room selected.</p>
        <div class="lyrics-panel" id="lyricsPanel" aria-live="polite">
          <p class="lyric-current" id="lyricCurrent">No synced lyrics in this room</p>
          <p class="lyric-next" id="lyricNext"></p>
        </div>
      </section>

      <form class="join-form" id="joinForm" autocomplete="off">
        <label class="session-label" for="sessionInput">Session</label>
        <div class="join-row">
          <input id="sessionInput" name="session" inputmode="url" spellcheck="false" placeholder="Session ID or join link">
          <button class="ghost-button" type="submit">Load</button>
        </div>
      </form>

      <section class="transport">
        <button class="primary-button" id="joinButton" type="button">Join Playback</button>
        <button class="ghost-button" id="openAppButton" type="button">Open App</button>
        <button class="ghost-button" id="copyButton" type="button">Copy Link</button>
        <div class="reaction-bar" aria-label="Room reactions">
          <button class="reaction-button" type="button" data-reaction="love" data-label="Love">Love</button>
          <button class="reaction-button" type="button" data-reaction="fire" data-label="Fire">Fire</button>
          <button class="reaction-button" type="button" data-reaction="wow" data-label="Whoa">Whoa</button>
          <button class="reaction-button" type="button" data-reaction="boost" data-label="Boost">Boost</button>
          <button class="reaction-button" type="button" data-reaction="plus" data-label="+1">+1</button>
        </div>
        <label class="volume-control" for="volumeSlider">
          <span>Volume</span>
          <input id="volumeSlider" type="range" min="0" max="100" value="90">
        </label>
      </section>

      <section class="timeline" aria-label="Playback timeline">
        <span id="currentTime">0:00</span>
        <input id="seekSlider" type="range" min="0" max="1000" value="0">
        <span id="durationTime">0:00</span>
      </section>

      <section class="queue-panel" aria-label="Shared queue">
        <div class="queue-head">
          <h3>Queue</h3>
          <span id="queueCount">0 tracks</span>
        </div>
        <ol id="queueList" class="queue-list"></ol>
        <form class="queue-add-form" id="queueAddForm" autocomplete="off">
          <input id="queueUrlInput" name="queueUrl" inputmode="url" spellcheck="false" placeholder="Request Spotify, YouTube, SoundCloud, Suno, or audio link">
          <button class="ghost-button" type="submit">Request</button>
        </form>
      </section>

      <span class="status-spinner" id="statusSpinner" aria-hidden="true"></span><p class="status-line" id="statusLine">No session loaded.</p>
    </section>
  </main>

  <audio id="sharedAudio" preload="metadata" crossorigin="anonymous"></audio>
  <script src="./player.js" defer></script>
</body>
</html>
